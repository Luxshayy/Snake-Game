<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>
<meta charset="UTF-8">

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: Arial;
}

#highscore{
  font-size:20px;
  margin-bottom:5px;
}

#scoreboard{
  font-size:28px;
  margin-bottom:10px;
}

canvas{
  border:1px solid white;
}
</style>

</head>

<body>

<div id="highscore">High Score: 0</div>
<div id="scoreboard">Score: 0</div>

<canvas width="400" height="400" id="game"></canvas>

<script>

var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

var grid = 16;
var count = 0;

var score = 0;
var scoreDisplay = document.getElementById("scoreboard");

var highScore = localStorage.getItem("snakeHighScore") || 0;
var highScoreDisplay = document.getElementById("highscore");
highScoreDisplay.innerText = "High Score: " + highScore;

var gameOver = false;
var gameStarted = false;

var snake = {
  x:160,
  y:160,
  dx:grid,
  dy:0,
  cells:[],
  maxCells:4
};

var apple = {
  x:320,
  y:320
};

function getRandomInt(min,max){
  return Math.floor(Math.random()*(max-min))+min;
}

function loop(){

  requestAnimationFrame(loop);

  if(!gameStarted){

    context.clearRect(0,0,canvas.width,canvas.height);

    context.fillStyle = "#00ff88";
    context.font = "50px Arial";
    context.textAlign = "center";
    context.fillText("SNAKE GAME", canvas.width/2, canvas.height/2 - 40);

    context.fillStyle = "white";
    context.font = "22px Arial";
    context.fillText("Press ENTER to Start", canvas.width/2, canvas.height/2 + 20);

    context.font = "16px Arial";
    context.fillText("Use Arrow Keys to Move", canvas.width/2, canvas.height/2 + 50);

    return;
  }

  if(gameOver){

    context.fillStyle = "red";
    context.font = "40px Arial";
    context.textAlign = "center";
    context.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);

    context.fillStyle = "white";
    context.font = "20px Arial";
    context.fillText("Press SPACE to Restart", canvas.width/2, canvas.height/2 + 30);

    return;
  }

  var speed = Math.max(4, 8 - Math.floor(score / 3));

  if(++count < speed){
    return;
  }

  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  if(snake.x < 0){
    snake.x = canvas.width - grid;
  }
  else if(snake.x >= canvas.width){
    snake.x = 0;
  }

  if(snake.y < 0){
    snake.y = canvas.height - grid;
  }
  else if(snake.y >= canvas.height){
    snake.y = 0;
  }

  snake.cells.unshift({x:snake.x,y:snake.y});

  if(snake.cells.length > snake.maxCells){
    snake.cells.pop();
  }

  /* Pulsing Apple */
  var pulse = Math.sin(Date.now()*0.005) * 2;

  context.fillStyle = "red";
  context.beginPath();
  context.arc(
    apple.x + grid/2,
    apple.y + grid/2,
    (grid/2 - 2) + pulse,
    0,
    Math.PI*2
  );
  context.fill();

  context.fillStyle = "#00ff88";
  context.shadowBlur = 10;
  context.shadowColor = "#00ff88";

  snake.cells.forEach(function(cell,index){

    context.fillRect(cell.x,cell.y,grid-1,grid-1);

    /* Snake Head Eyes */
    if(index === 0){

      context.fillStyle = "black";

      let eyeX1 = cell.x + 4;
      let eyeX2 = cell.x + 10;
      let eyeY1 = cell.y + 4;
      let eyeY2 = cell.y + 10;

      if(snake.dx === grid){
        eyeX1 = cell.x + 10;
        eyeX2 = cell.x + 10;
      }

      if(snake.dx === -grid){
        eyeX1 = cell.x + 2;
        eyeX2 = cell.x + 2;
      }

      if(snake.dy === grid){
        eyeY1 = cell.y + 10;
        eyeY2 = cell.y + 10;
      }

      if(snake.dy === -grid){
        eyeY1 = cell.y + 2;
        eyeY2 = cell.y + 2;
      }

      context.beginPath();
      context.arc(eyeX1, eyeY1, 2, 0, Math.PI*2);
      context.fill();

      context.beginPath();
      context.arc(eyeX2, eyeY2, 2, 0, Math.PI*2);
      context.fill();

      context.fillStyle = "#00ff88";
    }

    if(cell.x === apple.x && cell.y === apple.y){

      snake.maxCells++;

      score++;
      scoreDisplay.innerText = "Score: " + score;

      if(score > highScore){
        highScore = score;
        localStorage.setItem("snakeHighScore", highScore);
        highScoreDisplay.innerText = "High Score: " + highScore;
      }

      apple.x = getRandomInt(0,25)*grid;
      apple.y = getRandomInt(0,25)*grid;
    }

    for(var i=index+1;i<snake.cells.length;i++){

      if(cell.x === snake.cells[i].x && cell.y === snake.cells[i].y){
        gameOver = true;
      }

    }

  });

  context.shadowBlur = 0;

}

function restartGame(){

  snake.x = 160;
  snake.y = 160;
  snake.cells = [];
  snake.maxCells = 4;

  snake.dx = grid;
  snake.dy = 0;

  apple.x = getRandomInt(0,25)*grid;
  apple.y = getRandomInt(0,25)*grid;

  score = 0;
  scoreDisplay.innerText = "Score: 0";

  gameOver = false;
}

document.addEventListener("keydown",function(e){

  if(e.which === 13 && !gameStarted){
    gameStarted = true;
  }

  if(e.which === 32 && gameOver){
    restartGame();
  }

  if(e.which === 37 && snake.dx === 0){
    snake.dx = -grid;
    snake.dy = 0;
  }
  else if(e.which === 38 && snake.dy === 0){
    snake.dy = -grid;
    snake.dx = 0;
  }
  else if(e.which === 39 && snake.dx === 0){
    snake.dx = grid;
    snake.dy = 0;
  }
  else if(e.which === 40 && snake.dy === 0){
    snake.dy = grid;
    snake.dx = 0;
  }

});

requestAnimationFrame(loop);

</script>

</body>
</html>
